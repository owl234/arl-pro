name: ARL CI Build

on:
  push:
    branches:
      - main
      - dev  # 监听 main 和 dev 分支的代码推送触发

env:
  REGISTRY: ghcr.io
  # 将构建的前后端镜像命名。GHCR 规定镜像名必须包含 owner。
  IMAGE_NAME_FRONTEND: ${{ github.repository_owner }}/arl-frontend
  IMAGE_NAME_BACKEND: ${{ github.repository_owner }}/arl-backend

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 授权 GitHub Actions 将镜像写入你的私有包中

    steps:
      - name: 检出代码 (Checkout)
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx (用于开启缓存加速)
        uses: docker/setup-buildx-action@v3

      - name: 登录 GitHub 容器注册表 (Login to GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # GitHub 自动注入的临时 Token，无需手动配置

      - name: 构建并推送前端镜像 (Build Frontend)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest
          # 开启缓存加速，第二次构建速度将大幅提升
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 构建并推送后端镜像 (Build Backend)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max