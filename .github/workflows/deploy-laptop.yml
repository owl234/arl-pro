name: Deploy ARL to Laptop VM

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: [self-hosted, laptop]

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 🔧 Prepare Scripts
        run: |
          sed -i 's/\r$//' backend/wait-for-it.sh
          chmod +x backend/wait-for-it.sh

      # 🚀 升级版：环境自动装甲兵 (二进制直装版，免 sudo)
      - name: ⚙️ Check and Install Docker Compose
        run: |
          if ! docker compose version &> /dev/null && ! command -v docker-compose &> /dev/null; then
            echo "⚠️ 检测到未安装 Docker Compose，开始通过官方二进制直装..."
          
            # 1. 在当前用户目录下创建 Docker 插件专属文件夹
            mkdir -p ~/.docker/cli-plugins/
          
            # 2. 从官方直接下载最新稳定版 (v2)
            curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 -o ~/.docker/cli-plugins/docker-compose
          
            # 3. 赋予可执行权限
            chmod +x ~/.docker/cli-plugins/docker-compose
          
            echo "✅ Docker Compose (用户级) 安装完成！"
            # 验证安装
            docker compose version
          else
            echo "✅ 环境检测通过：Docker Compose 已就绪。"
          fi

      - name: 🚀 Build and Deploy via Docker Compose
        run: |
          # 统一使用现代化语法：docker compose (无横杠)
          docker compose -f docker-compose.local.yml down || true
          docker compose -f docker-compose.local.yml up -d --build
          docker image prune -f